version: '3.8'

services:
  # ==================== PostgreSQL Database ====================
  postgres:
    image: postgres:15-alpine
    container_name: characterforge-postgres
    environment:
      POSTGRES_DB: characterforge
      POSTGRES_USER: characterforge
      POSTGRES_PASSWORD: characterforge_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U characterforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis Cache ====================
  redis:
    image: redis:7-alpine
    container_name: characterforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== FastAPI Backend ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: characterforge-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://characterforge:characterforge_dev@postgres:5432/characterforge
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ENVIRONMENT: development
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Streamlit Frontend ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: characterforge-frontend
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      DATABASE_URL: postgresql://characterforge:characterforge_dev@postgres:5432/characterforge
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      BACKEND_URL: http://backend:8000
      ENVIRONMENT: development
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - postgres
      - redis

  # ==================== PGAdmin (Optional - Database Management) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: characterforge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@characterforge.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: characterforge-network
